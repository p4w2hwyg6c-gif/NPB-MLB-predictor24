
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPB → MLB 契約予測</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
    .container { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .search-box { background: white; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1rem; }
    .input-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    input { border: 1px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 15px; outline: none; }
    input:focus { border-color: #0071e3; }
    #player-input { flex: 2; min-width: 160px; }
    #year-input { flex: 1; min-width: 100px; }
    button.primary { background: #0071e3; color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 15px; cursor: pointer; white-space: nowrap; }
    button.primary:disabled { background: #999; cursor: not-allowed; }
    .hint { font-size: 12px; color: #888; margin-bottom: 8px; line-height: 1.6; }
    .notice { font-size: 12px; color: #555; background: #f0f7ff; border-left: 3px solid #0071e3; padding: 8px 12px; border-radius: 0 8px 8px 0; margin-bottom: 10px; line-height: 1.6; }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; }
    .ex-btn { background: #f0f0f0; border: none; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
    .loading { display: none; align-items: center; gap: 8px; color: #666; font-size: 14px; padding: 1rem 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #999; animation: pulse 1s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,100%{opacity:.3}50%{opacity:1} }
    .error { display: none; color: #e53e3e; font-size: 14px; background: #fff5f5; border-radius: 8px; padding: 10px 14px; margin-top: 8px; line-height: 1.6; }
    .result { display: none; background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; gap: 12px; }
    .ai-badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #e8f0fe; color: #1a73e8; margin-bottom: 6px; }
    .player-name { font-size: 22px; font-weight: 600; }
    .player-meta { font-size: 13px; color: #666; margin-top: 3px; }
    .conf-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .conf-高 { background: #d4edda; color: #155724; }
    .conf-中 { background: #fff3cd; color: #856404; }
    .conf-低 { background: #f0f0f0; color: #666; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .metric { background: #f5f5f7; border-radius: 12px; padding: .875rem; text-align: center; }
    .metric-val { font-size: 22px; font-weight: 600; }
    .metric-label { font-size: 11px; color: #888; margin-top: 3px; }
    .inflation-note { font-size: 11px; color: #0071e3; text-align: center; margin-top: -6px; margin-bottom: 14px; }
    .section-title { font-size: 13px; font-weight: 600; margin: 1rem 0 8px; color: #333; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .stat-label { color: #666; }
    .stat-val { font-weight: 500; }
    .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: #666; width: 80px; flex-shrink: 0; }
    .bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; background: #0071e3; border-radius: 4px; }
    .bar-score { font-size: 11px; color: #888; width: 28px; text-align: right; }
    .comp-box { background: #f5f5f7; border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-top: 8px; }
    .comment-box { background: #f5f5f7; border-radius: 12px; padding: 12px 14px; margin-top: 1rem; font-size: 13px; color: #555; line-height: 1.7; }
    .disclaimer { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="container">
  <h1>NPB → MLB 契約予測</h1>
  <p class="subtitle">NPB選手のMLB移籍時の契約年数・契約金を予測します（2025年市場基準）</p>

  <div class="search-box">
    <div class="notice">
      📌 NPB出身選手専用です。MLB所属選手は予測できません。<br>
      💰 契約金はすべて2025年現在の相場に換算して表示します。
    </div>
    <div class="input-row">
      <input type="text" id="player-input" placeholder="NPB選手名（例：佐々木朗希）">
      <input type="number" id="year-input" placeholder="年（任意）" min="1990" max="2025">
      <button class="primary" id="search-btn" onclick="runPrediction()">予測する ↗</button>
    </div>
    <p class="hint">年を空白にすると直近の成績で予測します。</p>
    <div class="examples">
      <button class="ex-btn" onclick="set('佐々木朗希', '')">佐々木朗希</button>
      <button class="ex-btn" onclick="set('山本由伸', 2022)">山本由伸 2022</button>
      <button class="ex-btn" onclick="set('坂本勇人', 2019)">坂本勇人 2019</button>
      <button class="ex-btn" onclick="set('近藤健介', '')">近藤健介</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span id="loading-text">選手データを調査中...</span>
  </div>
  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="player-header">
      <div>
        <span class="ai-badge">AI予測</span>
        <div class="player-name" id="player-name"></div>
        <div class="player-meta" id="player-meta"></div>
      </div>
      <span class="conf-badge" id="conf-badge"></span>
    </div>

    <div class="metrics">
      <div class="metric"><div class="metric-val" id="res-years">—</div><div class="metric-label">予測契約年数</div></div>
      <div class="metric"><div class="metric-val" id="res-total">—</div><div class="metric-label">予測総額</div></div>
      <div class="metric"><div class="metric-val" id="res-aav">—</div><div class="metric-label">年平均 (AAV)</div></div>
    </div>
    <p class="inflation-note">💰 金額は2025年市場相場に換算済み</p>

    <div class="section-title">主要スタッツ</div>
    <div class="stats-grid" id="stats-grid"></div>

    <div class="section-title">評価</div>
    <div id="bar-wrap"></div>

    <div class="section-title">類似事例</div>
    <div class="comp-box" id="comp-box"></div>

    <div class="comment-box" id="ai-comment"></div>
    <p class="disclaimer">※ AIが公開情報をもとに分析した参考値です。実際の契約は交渉・市場状況により異なります。</p>
  </div>
</div>

<script>
  function set(name, year) {
    document.getElementById('player-input').value = name;
    document.getElementById('year-input').value = year;
  }

  const loadSteps = ['選手データを調査中...', 'スタッツを解析中...', '2025年市場に換算中...', '契約を試算中...'];

  async function runPrediction() {
    const playerName = document.getElementById('player-input').value.trim();
    const year = document.getElementById('year-input').value.trim();
    if (!playerName) return;

    document.getElementById('result').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('search-btn').disabled = true;

    let li = 0;
    const lt = setInterval(() => {
      document.getElementById('loading-text').textContent = loadSteps[Math.min(++li, loadSteps.length - 1)];
    }, 1200);

    try {
      const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName, year: year || null }),
      });

      clearInterval(lt);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('search-btn').disabled = false;

      const j = await res.json();

      if (!res.ok) {
        document.getElementById('error').textContent = '⚠️ ' + (j.detail || j.error || 'エラーが発生しました。もう一度お試しください。');
        document.getElementById('error').style.display = 'block';
        return;
      }

      if (!j.found) {
        document.getElementById('error').textContent = `「${playerName}」はNPB出身選手として確認できませんでした。`;
        document.getElementById('error').style.display = 'block';
        return;
      }

      document.getElementById('player-name').textContent = j.name;
      document.getElementById('player-meta').textContent = `${j.team || ''} ／ ${j.position || ''} ／ ${j.age || '?'}歳`;
      document.getElementById('res-years').textContent = j.predicted_years + '年';
      document.getElementById('res-total').textContent = '$' + j.predicted_total_m + 'M';
      document.getElementById('res-aav').textContent = '$' + j.aav_m + 'M';

      const cb = document.getElementById('conf-badge');
      cb.textContent = '信頼度：' + j.confidence;
      cb.className = 'conf-badge conf-' + j.confidence;

      const st = j.stats || {};
      const statRows = [1,2,3,4,5,6]
        .filter(i => st[`stat${i}_label`])
        .map(i => `<div class="stat-row"><span class="stat-label">${st[`stat${i}_label`]}</span><span class="stat-val">${st[`stat${i}_value`]}</span></div>`)
        .join('');
      document.getElementById('stats-grid').innerHTML = statRows;

      const sc = j.scores || {};
      const barItems = [1,2,3,4]
        .filter(i => sc[`label${i}`])
        .map(i => `
          <div class="bar-item">
            <span class="bar-label">${sc[`label${i}`]}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${sc[`score${i}`] || 0}%"></div></div>
            <span class="bar-score">${sc[`score${i}`] || 0}</span>
          </div>`)
        .join('');
      document.getElementById('bar-wrap').innerHTML = barItems;

      document.getElementById('comp-box').innerHTML = j.similar_case_name
        ? `<strong>${j.similar_case_name}</strong>　$${j.similar_case_amount}M（2025年換算）`
        : '該当事例なし';

      document.getElementById('ai-comment').textContent = j.comment || '';
      document.getElementById('result').style.display = 'block';

    } catch (e) {
      clearInterval(lt);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('search-btn').disabled = false;
      document.getElementById('error').textContent = 'エラーが発生しました。もう一度お試しください。';
      document.getElementById('error').style.display = 'block';
    }
  }

  document.getElementById('player-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runPrediction();
  });
</script>
</body>
</html>
